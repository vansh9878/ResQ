<!DOCTYPE html>
<html>
<head>
  <title>Login - RESQ</title>

  <!-- Firebase (IMPORTANT: compat version) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>

<body>

<h2>Login / Signup</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<script>


const firebaseConfig = {
  apiKey: "AIzaSyCG-7PV7YtIjvQDLg4dayZ14JByvi8DcHg",
  authDomain: "resq-app-d06c9.firebaseapp.com",
  projectId: "resq-app-d06c9",
  storageBucket: "resq-app-d06c9.firebasestorage.app",
  messagingSenderId: "519898267701",
  appId: "1:519898267701:web:5b575bc1e0660cc24ff17c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ SIGNUP
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Signup successful!");
    })
    .catch(err => alert(err.message));
}

// ✅ LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login successful!");
      window.location.href = "dashboard.html";
    })
    .catch(err => alert(err.message));
}

</script>

</body>
</html>
